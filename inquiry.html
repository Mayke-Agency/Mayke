<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Mayke — Inquiry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Start a project with Mayke." />
    <meta name="theme-color" content="#EBDAC6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=1" />
  </head>

  <body class="page-inquiry">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header is-hidden" data-header>
      <div class="container header-inner">
        <a class="nav-brand" href="index.html#about" aria-label="Mayke home">
          <img class="nav-logo" src="assets/maykeLogoDark.svg" alt="Mayke" />
        </a>

        <button
          class="nav-toggle"
          data-burger
          aria-label="Open menu"
          aria-expanded="false"
        >
          <span></span><span></span>
        </button>

        <nav class="site-nav page-inquiry" data-nav aria-label="Primary">
          <ul class="nav-list">
            <li><a href="index.html#about">About</a></li>
            <li><a href="capabilities.html">Capabilities</a></li>
            <li><a href="clients.html">Portfolio</a></li>
            <li><a class="nav-cta" href="inquiry.html">Work with us</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="inquiry inquiry--bleed" aria-label="Inquiry">
        <div
          class="inquiry-bg"
          style="background-image: url(&quot;assets/product-shoot.webp&quot;)"
        ></div>

        <div class="inquiry-wrap">
          <header class="inquiry-head">
            <p class="inquiry-kicker">Inquiry</p>
          </header>

          <form class="inquiry-form" id="inquiry-form" novalidate>
            <div class="grid">
              <div class="field">
                <label for="name">Your name</label>
                <input
                  id="name"
                  name="name"
                  type="text"
                  placeholder="Full name"
                  required
                />
              </div>

              <div class="field">
                <label for="name">Your company</label>
                <input
                  id="name"
                  name="name"
                  type="text"
                  placeholder="Company name"
                  required
                />
              </div>

              <div class="field">
                <label for="email">Email</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  placeholder="you@brand.com"
                  required
                />
              </div>
            </div>

            <div class="field">
              <label for="message">How can we support you?</label>
              <textarea
                id="message"
                name="message"
                rows="6"
                placeholder="Goals, context, links, timing..."
                required
              ></textarea>
            </div>

            <div class="hp" aria-hidden="true">
              <label for="company">Company</label>
              <input
                type="text"
                id="company"
                name="company"
                tabindex="-1"
                autocomplete="off"
              />
            </div>

            <div class="form-row">
              <button class="btn chic-submit" type="submit">
                Send inquiry
              </button>
            </div>

            <p id="form-status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container foot">
        <div class="foot-brand">
          <img
            class="foot-logo"
            src="assets/maykeLogoDark.svg"
            alt="Mayke logo"
          />
        </div>

        <nav aria-label="Social" class="foot-social">
          <!-- Instagram -->
          <a
            href="https://instagram.com/YOURHANDLE"
            target="_blank"
            rel="noopener"
            aria-label="Instagram"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <rect x="3" y="3" width="18" height="18" rx="5"></rect>
              <circle cx="12" cy="12" r="4"></circle>
              <circle cx="17.5" cy="6.5" r="1"></circle>
            </svg>
          </a>

          <!-- TikTok -->
          <a
            href="https://tiktok.com/@YOURHANDLE"
            target="_blank"
            rel="noopener"
            aria-label="TikTok"
          >
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M16.5 3c.4 2 1.8 3.6 3.5 4v3c-1.3 0-2.5-.4-3.5-1.1v6.2c0 3-2.4 5.4-5.4 5.4S5.7 18.1 5.7 15s2.4-5.4 5.4-5.4c.3 0 .6 0 .9.1v3.1c-.3-.1-.6-.2-.9-.2-1.3 0-2.4 1.1-2.4 2.4s1.1 2.4 2.4 2.4 2.4-1.1 2.4-2.4V3h3z"
              />
            </svg>
          </a>

          <!-- Email -->
          <a href="mailto:alan@maykeagency.com" aria-label="Email">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <path d="M3 7l9 6 9-6"></path>
            </svg>
          </a>
        </nav>

        <div class="foot-meta">© <span id="year"></span> Mayke</div>
      </div>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
